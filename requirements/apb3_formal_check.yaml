name: apb3_formal_verification
dut_module: apb3_slave
mode: formal

# APB3 signals mapped to DUT internal names
signals:
  clk:      PCLK
  rst_n:    PRESETn
  psel:     PSEL
  penable:  PENABLE
  pwrite:   PWRITE
  paddr:    PADDR
  pwdata:   PWDATA
  prdata:   PRDATA
  pready:   PREADY
  pslverr:  PSLVERR

parameters:
  ADDR_W: 32
  DATA_W: 32
  MAX_WAIT: 16

requirements:
  # ============================================================
  # PENABLE Timing (ARM AMBA3 APB Specification, Section 2.1)
  # ============================================================
  - "PENABLE must assert exactly one cycle after PSEL. When PSEL rises, PENABLE must rise on the next clock edge (Setup → Access transition)."

  # ============================================================
  # PREADY Timeout (ARM AMBA3 APB Specification, Section 2.1.2)
  # ============================================================
  - "PREADY must assert within MAX_WAIT cycles of PENABLE assertion. If the slave does not assert PREADY, a timeout condition must be detected."

  # ============================================================
  # PSLVERR Validity (ARM AMBA3 APB Specification, Section 2.3)
  # ============================================================
  - "PSLVERR is only valid when PSEL, PENABLE, and PREADY are all asserted simultaneously. This is the last cycle of the APB transfer."

  # ============================================================
  # Signal Stability (ARM AMBA3 APB Specification, Section 2.1)
  # ============================================================
  - "PADDR and PWRITE must remain stable throughout the access phase (from Setup to Access until PREADY assertion)."
  - "PWDATA must remain stable during the entire write transfer while PENABLE is asserted and PREADY is low."

  # ============================================================
  # Mutual Exclusion (ARM AMBA3 APB Specification, Section 3.1)
  # ============================================================
  - "PSEL and PENABLE must never both be asserted simultaneously unless transitioning through the Setup→Access state. PENABLE can only assert one cycle after PSEL."

  # ============================================================
  # No Spurious Transfer (ARM AMBA3 APB Specification, Section 4.1)
  # ============================================================
  - "An access can only occur when PSEL is asserted. If PSEL is low, PENABLE must also be low."

  # ============================================================
  # Reset Behavior
  # ============================================================
  - "After PRESETn de-assertion, PSEL and PENABLE must be low (idle state)."
  - "PREADY can be any value when PENABLE is low."

output:
  dir: generated/apb3_formal/
  wrapper: true
  verbose: true
